name: DevSecOps ZAP Scan

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  issues: write
  pull-requests: write # This is required to post comments on the PR

jobs:
  security-dast-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Dependencies
        run: pnpm install

      - name: Build and Start Application in Background
        run: |
          pnpm run build
          pnpm run start & 
          sleep 10 

      - name: Fix Directory Permissions 
        run: chmod -R 777 .

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:3000' 
          fail_action: true # Keep this TRUE so it blocks the merge on real vulnerabilities
          rules_file_name: '.zap/rules.tsv' # Points to our new rules file
          cmd_options: '-a'

      # NEW STEP: Posts the Markdown report directly to the PR!
      - name: Post ZAP Report to PR
        if: always() # Ensures it runs even if the ZAP scan fails the build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f report_md.md ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file report_md.md
          fi