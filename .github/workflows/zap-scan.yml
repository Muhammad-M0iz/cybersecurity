name: DevSecOps ZAP Scan

on:
  pull_request:
    branches: [ "main" ]

# FIX: We give the pipeline permission to create bug tickets (Issues)
permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  security-dast-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Dependencies
        run: pnpm install

      - name: Build and Start Application in Background
        run: |
          pnpm run build
          pnpm run start & 
          sleep 10 

      - name: Fix Directory Permissions 
        run: chmod -R 777 .

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000' 
          fail_action: true 
          cmd_options: '-a'