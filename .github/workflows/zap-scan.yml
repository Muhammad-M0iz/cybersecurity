name: DevSecOps ZAP Scan

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  security-dast-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Dependencies
        run: pnpm install

      # FIX: Directly invoke the standard Next.js builder, ignoring Cloudflare
      - name: Build and Start Application in Background
        run: |
          pnpm exec next build
          pnpm exec next start & 
          sleep 10 

      - name: Fix Directory Permissions 
        run: chmod -R 777 .

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:3000' 
          fail_action: true 
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'

      - name: Post ZAP Report to PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f report_md.md ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file report_md.md
          fi