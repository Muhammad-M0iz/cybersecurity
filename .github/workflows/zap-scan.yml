name: DevSecOps ZAP Scan

on:
  pull_request:
    branches: [ "main" ]

jobs:
  security-dast-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Dependencies
        run: pnpm install

      - name: Build and Start Application in Background
        # This builds the app and runs it locally inside the GitHub runner
        run: |
          pnpm run build
          pnpm run start & 
          sleep 10 # Gives the Next.js server 10 seconds to fully boot up

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          # ZAP attacks the local server we just spun up
          target: 'http://localhost:3000' 
          # Fails the GitHub Action if it finds vulnerabilities
          fail_action: true 
          # Generates a report you can show in your presentation
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'